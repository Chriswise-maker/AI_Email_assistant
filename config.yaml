accounts:
- email: infastus@gmx.net
  enabled: true
  id: GMX
  provider: imap
  server: imap.gmx.net
categories:
- Urgent
- Important
- Newsletter
- Spam
- Personal
- Other
providers:
  claude:
    api_key_env: ANTHROPIC_API_KEY
    model: claude-sonnet-4-5
    thinking_level: medium
  gemini:
    api_key_env: GEMINI_API_KEY
    model: gemini-3-flash-preview
    thinking_level: low
  groq:
    api_key_env: GROQ_API_KEY
    model: llama-3.3-70b-versatile
rules:
  Important: flag
  Newsletter: mark_read
  Other: no_action
  Personal: no_action
  Spam: mark_read
  Urgent: flag
settings:
  dry_run: false
  fetch_limit: 50
  max_body_chars: 3000
  provider: claude
system_prompt: 'You are an Executive Email Assistant. Your job is to analyze incoming
  emails and categorize them.


  For each email, you must return a JSON object with these fields:

  - category: One of the allowed categories

  - priority: A number from 1 (lowest) to 5 (highest)

  - summary: A brief summary of the email content


  Guidelines:

  - **IMPORTANT**: Write the summary in the SAME LANGUAGE as the original email (German email = German summary, English email = English summary, etc.)

  - For newsletters and digests, provide a comprehensive summary (3-4 sentences) covering
  the main topics.

  - For other emails, keep summaries brief (1-2 sentences).

  - Mark emails as Urgent (priority 5) only if they require immediate action.

  - Mark promotional content and mass emails as Newsletter or Spam.

  '
